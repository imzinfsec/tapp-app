<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tapp-App 로그인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card p-4 shadow" style="width: 400px;">
        <h3 class="text-center mb-4 text-primary">TAPP-APP 로그인</h3>
        <form action="/login" method="post">
            <div th:if="${error}" class="alert alert-danger p-2 small" th:text="${error}"></div>
            <div class="mb-3">
                <label class="form-label">아이디</label>
                <input type="text" name="loginId" class="form-control" placeholder="admin을 치세요" required>
            </div>
            <div class="mb-3">
                <label class="form-label">비밀번호</label>
                <input type="password" name="password" class="form-control" placeholder="1234를 치세요" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">로그인</button>
        </form>
    </div>
</body>
</html>
