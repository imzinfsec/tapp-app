<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글쓰기</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container py-5" style="max-width: 700px;">
    <h3 class="mb-4">✏️ 새로운 글 작성하기</h3>
    <form action="/posts/write" method="post" class="card p-4 shadow-sm">
        <div class="mb-3">
            <label class="form-label fw-bold">글 제목</label>
            <input type="text" name="title" class="form-control" placeholder="제목을 입력하세요" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">내용</label>
            <textarea name="content" class="form-control" rows="6" placeholder="여기에 내용을 마음껏 작성하세요" required></textarea>
        </div>
        <div class="d-flex justify-content-end gap-2">
            <a href="/posts" class="btn btn-secondary">취소</a>
            <button type="submit" class="btn btn-success">등록하기</button>
        </div>
    </form>
</body>
</html>
