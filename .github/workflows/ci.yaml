name: Java Spring Boot CI

on:
  push:
    branches: [ "main" ] # 메인 브랜치에 코드가 푸시되면 작동

permissions:
  id-token: write # AWS OIDC 인증을 위해 필수
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle # Gradle을 쓰신다면 gradle로 변경

    # [중요] 테라폼 OIDC 역할을 사용하여 로그인 과정 없이 AWS에 안전하게 접속
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::003493200358:role/tapp-github-actions-role
        aws-region: ap-northeast-2

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build with Gradle
  #    run: mvn clean package -DskipTests # Gradle이라면 ./gradlew build -x test
      run: ./gradlew build -x test

    # 도커 이미지를 빌드하고 ECR에 latest 태그로 푸시합니다.
    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: tapp-app
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG